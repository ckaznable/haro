services:
  postgres:
    build:
      context: .
      dockerfile: Containerfile.postgres
    environment:
      POSTGRES_USER: haro
      POSTGRES_PASSWORD: haro_dev_password
      POSTGRES_DB: haro
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ${HOME}/.haro/postgres:/var/lib/postgresql/data

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${HOME}/.haro/qdrant:/qdrant/storage
