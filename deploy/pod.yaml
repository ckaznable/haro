# 使用前請先替換 hostPath 中的 /home/YOUR_USER 為實際家目錄
# podman play kube deploy/pod.yaml
# 事前建置映像：podman build -t haro-postgres -f deploy/Containerfile.postgres deploy/
# 或使用 docker compose：docker compose -f deploy/docker-compose.yml up -d
apiVersion: v1
kind: Pod
metadata:
  name: haro
  labels:
    app: haro
spec:
  containers:
    - name: postgres
      image: localhost/haro-postgres:latest
      env:
        - name: POSTGRES_USER
          value: haro
        - name: POSTGRES_PASSWORD
          value: haro_dev_password
        - name: POSTGRES_DB
          value: haro
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
      ports:
        - containerPort: 5432
          hostPort: 5432
      volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data

    - name: qdrant
      image: docker.io/qdrant/qdrant:latest
      ports:
        - containerPort: 6333
          hostPort: 6333
        - containerPort: 6334
          hostPort: 6334
      volumeMounts:
        - name: qdrant-data
          mountPath: /qdrant/storage

  volumes:
    - name: pg-data
      hostPath:
        path: /home/john/.haro/postgres
        type: DirectoryOrCreate
    - name: qdrant-data
      hostPath:
        path: /home/john/.haro/qdrant
        type: DirectoryOrCreate
