# Haro 設定檔

# agents_path = "agents"

# Fallback channels（當 agents_path 無 agent 時使用）
# [[channels]]
# enable = true
# channel_type = "telegram"
# bot_tokens_env = "TELEGRAM_BOT_TOKENS"
# allowed_users = []

[database]
url = "postgres://haro:haro_dev_password@localhost:5432/haro"

[qdrant]
url = "http://localhost:6334"

[embedding]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
dimension = 768
model = "gemini-embedding-001"

[llm]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
model = "gemini-3.1-flash-lite-preview"
thinking_level = "minimal"

[worker]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
model = "gemini-2.5-flash-lite"
thinking_budget = 0
