# Haro 設定檔

# agents_path = "agents"

# Fallback channels（當 agents_path 無 agent 時使用）
# [[channels]]
# enable = true
# channel_type = "telegram"
# bot_token_env = "TELEGRAM_BOT_TOKEN"
# allowed_users = []

[database]
url = "postgres://haro:haro_dev_password@localhost:5432/haro"

[qdrant]
url = "http://localhost:6334"

[embedding]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
dimension = 768
model = "gemini-embedding-001"

[llm]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
model = "gemini-3.1-flash-lite-preview"
thinking_level = "minimal"

[worker]
provider = "gemini"
api_key_env = "GEMINI_API_KEY"
model = "gemini-2.5-flash-lite"
thinking_budget = 0

# 心跳間隔（秒），預設 3600
# heartbeat_interval = 3600

# 大腦模型（BRAIN_HEARTBEAT.md 觸發時使用），未設定則使用 llm
# [brain]
# provider = "gemini"
# api_key_env = "GEMINI_API_KEY"
# model = "gemini-2.5-pro"
# thinking_budget = 8192
